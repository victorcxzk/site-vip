<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/index.html" class="brand">
        <span class="brand-badge"><img src="/img/avatar-photo.svg" alt="Foto principal"></span>
        <span><span class="brand-title">Seu Espaço Privado</span><span class="brand-sub">conteúdo exclusivo</span></span>
      </a>
      <nav class="desktop-nav"><a href="/login.html">Entrar</a><a href="/criar-conta.html">Criar conta</a></nav>
    </div>
  </header>
  <main class="auth-layout">
    <div class="container auth-grid">
      <section class="glass-card form-card">
        <h1>Recuperar acesso</h1>
        <p>Primeiro envie o link para o seu e-mail. Depois, quando voltar por ele, escolha sua nova senha.</p>
        <form id="resetForm" novalidate>
          <div class="field"><label for="email">Seu e-mail</label><input id="email" type="email"></div>
          <div class="form-actions"><button class="button" type="submit">Enviar link</button></div>
          <div class="message-box" data-message></div>
        </form>
        <hr style="border:none; border-top:1px solid rgba(255,255,255,0.08); margin:26px 0;">
        <form id="newPasswordForm" novalidate>
          <div class="field"><label for="senha">Nova senha</label><input id="senha" type="password"></div>
          <div class="field"><label for="confirmar">Confirmar senha</label><input id="confirmar" type="password"></div>
          <div class="form-actions"><button class="button ghost" type="submit">Salvar nova senha</button></div>
        </form>
      </section>
      <div class="auth-side">
        <img src="/img/gallery-3.svg" alt="Imagem de apoio">
        <div class="auth-side-copy">
          <h2>Volte rápido.</h2>
          <p>Seu acesso fica ligado à sua conta. Assim que a senha estiver certa de novo, você entra normalmente.</p>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
