<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/index.html" class="brand">
        <span class="brand-badge"><img src="/img/avatar-photo.svg" alt="Foto principal"></span>
        <span><span class="brand-title">Seu Espaço Privado</span><span class="brand-sub">conteúdo exclusivo</span></span>
      </a>
      <nav class="desktop-nav"><a href="/index.html">Início</a><a href="/assinar.html">Liberar acesso</a></nav>
      <div class="header-actions"><a class="button ghost" href="/criar-conta.html">Criar conta</a></div>
    </div>
  </header>
  <main class="auth-layout">
    <div class="container auth-grid">
      <div class="auth-side">
        <img src="/img/hero-cover.svg" alt="Imagem principal">
        <div class="auth-side-copy">
          <h2>Entre e continue de onde parou.</h2>
          <p>Seu cadastro leva poucos segundos e sua área fica pronta para receber o acesso assim que você liberar.</p>
        </div>
      </div>
      <section class="glass-card form-card">
        <h1>Entrar</h1>
        <p>Use o e-mail e a senha que você cadastrou.</p>
        <form id="loginForm" novalidate>
          <div class="field"><label for="email">E-mail</label><input id="email" type="email" autocomplete="email"></div>
          <div class="field"><label for="senha">Senha</label><input id="senha" type="password" autocomplete="current-password"></div>
          <div class="form-actions">
            <button class="button" type="submit">Entrar</button>
            <a class="button ghost" href="/criar-conta.html">Criar conta</a>
          </div>
          <div class="inline-links"><a href="/redefinir-senha.html">Esqueci minha senha</a></div>
          <div class="message-box" data-message></div>
        </form>
      </section>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
