<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minha conta • Beatriz Lopes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="account">

  <header class="site-header">
    <div class="container header-inner">
      <a href="/index.html" class="brand">
        <span class="brand-badge"><img src="/img/avatar-photo.png" alt="Beatriz Lopes"></span>
        <span>
          <span class="brand-title">Beatriz Lopes</span>
          <span class="brand-sub">privacy exclusivo 😈</span>
        </span>
      </a>
      <nav class="desktop-nav">
        <a href="/index.html">Início</a>
        <a href="/conteudo.html" data-member-link>Conteúdos</a>
        <a href="https://instagram.com/lopes.beeatrizz" target="_blank" rel="noopener noreferrer">Instagram</a>
      </nav>
      <div class="header-actions">
        <a class="button ghost" href="/login.html" data-guest-only>Entrar</a>
        <a class="button" href="/criar-conta.html" data-guest-only>Criar conta</a>
        <a class="button ghost header-user" href="/minha-conta.html" data-auth-only hidden>
          <span class="header-user-label">@<span data-user-name>usuario</span></span>
        </a>
<button class="button" data-auth-only hidden onclick="logout()">Sair</button>
      </div>
      <button class="menu-toggle" id="mobileMenuToggle" aria-expanded="false" aria-controls="mobileMenu">Menu</button>
    </div>
    <div class="container mobile-menu" id="mobileMenu" data-open="false">
      <div class="mobile-menu-panel">
        <a href="/index.html" data-close-menu>Início</a>
        <a href="/conteudo.html" data-member-link data-close-menu>Conteúdos</a>
        <a href="https://instagram.com/lopes.beeatrizz" target="_blank" rel="noopener noreferrer" data-close-menu>Instagram</a>
        <a href="/minha-conta.html" data-auth-only hidden data-close-menu>Minha conta</a>
<button class="button" data-auth-only hidden onclick="logout()">Sair</button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container member-layout">

      <aside>
        <div class="card">
          <h3 style="font-size:.9rem;font-weight:700;margin-bottom:16px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;">Status da assinatura</h3>
          <div id="memberStatus" class="subscription-status-card inactive">
            <div class="subscription-status-label">Verificando…</div>
          </div>
          <div id="subscriptionDetails" hidden>
            <p class="subscription-expires" id="subscriptionExpires"></p>
          </div>
          <a class="button" href="/assinar.html" id="upgradeBtn" style="margin-top:16px;width:100%;text-align:center;" hidden>
            Liberar acesso 😈
          </a>
          <a class="button" href="/conteudo.html" style="margin-top:16px;width:100%;text-align:center;" id="contentBtn" hidden>
            Ver conteúdos 😈
          </a>
        </div>
      </aside>

      <div>
        <!-- Perfil -->
        <section class="card" style="margin-bottom:24px;">
          <h2 class="section-title" style="font-size:28px;margin-bottom:24px;">Meu perfil</h2>
          <form id="accountForm" novalidate>
            <div class="form-group">
              <label>Nome</label>
              <input id="nome" type="text" placeholder="Seu nome">
            </div>
            <div class="form-group">
              <label>Usuário</label>
              <input id="usuario" type="text" placeholder="@usuario">
            </div>
            <div class="form-group">
              <label>Telegram (sem @)</label>
              <input id="telegram" type="text" placeholder="username">
            </div>
            <div class="form-group">
              <label>Bio</label>
              <textarea id="bio" rows="3" placeholder="Sobre você…"></textarea>
            </div>
            <div class="message-box" data-message></div>
            <div class="form-actions">
              <button class="button" type="submit">Salvar</button>
            </div>
          </form>
        </section>

        <!-- Histórico de pedidos -->
        <section class="card">
          <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:20px;">Histórico de pedidos</h2>
          <div id="requestHistory">
            <div class="empty-state">Carregando…</div>
          </div>
        </section>
      </div>

    </div>
  </main>

  <!-- Widget de suporte -->
  <div class="support-widget">
    <button class="support-btn" id="supportToggle" title="Suporte" aria-label="Suporte">💬</button>
    <div class="support-panel" id="supportPanel">
      <p>Precisa de ajuda?</p>
      <a class="support-link instagram" href="https://instagram.com/lopes.beeatrizz" target="_blank" rel="noopener noreferrer">
        <span>📷</span> Instagram
      </a>
      <a class="support-link telegram" id="supportTelegram" href="#" target="_blank" rel="noopener noreferrer">
        <span>✈️</span> Telegram
      </a>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
