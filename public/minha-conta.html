<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js" defer></script>

  <title>Minha conta • Perfil VIP</title>
</head>
<body data-page="minha-conta">
  <div class="site-bg"></div><div class="site-noise"></div>

<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html">
      <span class="brand-mark"><img src="img/avatar-photo.svg" alt="Foto de perfil"></span>
      <span class="brand-copy">
        <strong>Seu perfil VIP</strong>
        <span data-nav-status>Prévia aberta</span>
      </span>
    </a>

    <div class="nav-desktop">
      <div class="nav-links">
        <a class="pill-button" href="index.html#previas">Prévia</a>
        <a class="pill-button" href="assinar.html">Assinar</a>
        <a class="pill-button" href="conteudo.html">Área privada</a>
      </div>
      <div class="nav-user-row" data-guest-only>
        <a class="secondary-button" href="login.html">Entrar</a>
        <a class="button" href="criar-conta.html">Criar conta</a>
      </div>
      <div class="nav-user-row" data-auth-only hidden>
        <a class="pill-button" href="minha-conta.html"><span data-user-email>Minha conta</span></a>
        <a class="pill-button" data-admin-only hidden href="admin.html">Admin</a>
        <button class="button" type="button" onclick="logout()">Sair</button>
      </div>
    </div>

    <button class="mobile-toggle" type="button" aria-expanded="false" data-mobile-toggle>
      ☰
    </button>
  </div>
</nav>

<div class="mobile-panel-wrap" data-mobile-menu data-open="false">
  <div class="mobile-panel">
    <div class="nav-links">
      <a class="pill-button" href="index.html#previas">Prévia</a>
      <a class="pill-button" href="assinar.html">Assinar</a>
      <a class="pill-button" href="conteudo.html">Área privada</a>
    </div>
    <div class="nav-user-row" data-guest-only>
      <a class="secondary-button" href="login.html">Entrar</a>
      <a class="button" href="criar-conta.html">Criar conta</a>
    </div>
    <div class="nav-user-row" data-auth-only hidden>
      <a class="pill-button" href="minha-conta.html"><span data-user-name>Minha conta</span></a>
      <a class="pill-button" data-admin-only hidden href="admin.html">Admin</a>
      <button class="button" type="button" onclick="logout()">Sair</button>
    </div>
  </div>
</div>

  <main class="page-shell">
    <section class="account-layout">
      <article class="account-card">
        <span class="kicker">Minha conta</span>
        <h1 class="page-title" id="accountName">Sua conta</h1>
        <p class="lead" id="accountTag">@perfil</p>
        <div class="account-stat"><span>Status</span><strong id="accountStatus">Carregando...</strong></div>
        <div class="account-stat"><span>Plano</span><strong id="accountPlan">—</strong></div>
        <div class="account-stat"><span>Período</span><strong id="accountPeriod">—</strong></div>
        <div class="account-stat"><span>Pedido</span><strong id="requestStatus">—</strong></div>
        <div class="button-row">
          <a class="button" href="assinar.html">Pedir acesso</a>
          <a class="secondary-button" href="conteudo.html">Abrir área</a>
        </div>
      </article>

      <article class="form-card">
        <h3>Editar perfil</h3>
        <form id="perfilForm">
          <label>Nome<input type="text" name="nome"></label>
          <label>@usuário<input type="text" name="usuario"></label>
          <label>@Telegram<input type="text" name="telegram"></label>
          <label>Bio<textarea name="bio" rows="4"></textarea></label>
          <button class="button" type="submit">Salvar</button>
        </form>
        <div class="flash" data-flash></div>
      </article>
    </section>
  </main>
</body>
</html>
