<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minha conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="account">
  <header class="site-header">
    <div class="container header-inner">
      <a href="/index.html" class="brand">
        <span class="brand-badge"><img src="/img/avatar-photo.svg" alt="Foto principal"></span>
        <span><span class="brand-title">Seu Espaço Privado</span><span class="brand-sub">conteúdo exclusivo</span></span>
      </a>
      <nav class="desktop-nav"><a href="/index.html">Início</a><a href="/conteudo.html" data-member-link>Conteúdo</a><a href="/assinar.html">Liberar acesso</a></nav>
      <div class="header-actions"><a class="button ghost" href="/admin.html" data-admin-only hidden>Admin</a><button class="button" onclick="logout()">Sair</button></div>
    </div>
  </header>
  <main class="section">
    <div class="container member-layout">
      <section class="member-box card">
        <span class="badge" id="memberStatus">Seu acesso ainda não foi liberado</span>
        <h2>Sua conta</h2>
        <p>Edite seu perfil, confira seu pedido e volte quando quiser.</p>
        <form id="accountForm" novalidate>
          <div class="field"><label for="nome">Nome</label><input id="nome" type="text"></div>
          <div class="field"><label for="usuario">Usuário</label><input id="usuario" type="text"></div>
          <div class="field"><label for="telegram">Telegram</label><input id="telegram" type="text"></div>
          <div class="field"><label for="bio">Recado</label><textarea id="bio" rows="4" placeholder="Escreva algo curto, se quiser."></textarea></div>
          <div class="form-actions"><button class="button" type="submit">Salvar</button><a class="button ghost" href="/assinar.html">Liberar acesso</a></div>
          <div class="message-box" data-message></div>
        </form>
      </section>
      <section class="member-box card">
        <h2>Seu pedido</h2>
        <p>Quando você tocar em liberar acesso, ele aparece aqui automaticamente.</p>
        <div id="requestHistory" class="mini-grid"></div>
      </section>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
